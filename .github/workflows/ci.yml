name: CI

on:
  push:
    branches: [main, dev/**]
  pull_request:
    branches: [main, dev/**]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - name: Install taskwarrior
        run: sudo apt-get install -y taskwarrior
      - run: uv run pytest --cov=taskmajor --cov-report=xml --cov-fail-under=85

      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build

      - name: Test install dist
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import taskmajor; print('imported', taskmajor.__name__)"

      - name: Smoke run server help
        run: uv run -m taskmajor.bootstrap.server --help

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run mypy taskmajor/
