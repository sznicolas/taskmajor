name: Validate MCP artifacts

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install fastmcp
        run: |
          python -m pip install --upgrade pip
          pip install fastmcp
      - name: Regenerate MCP artifacts
        run: |
          ./scripts/regen_mcp.sh
      - name: Validate artifacts
        run: |
          set -e
          if [ ! -s artifacts/mcp_mcpjson.json ]; then
            echo "ERROR: artifacts/mcp_mcpjson.json is missing or empty" >&2
            exit 2
          fi
          # Basic JSON sanity and presence of a top-level server key
          python - <<'PY'
import json,sys
with open('artifacts/mcp_mcpjson.json',encoding='utf-8') as f:
    j=json.load(f)
if not isinstance(j, dict) or len(j)==0:
    print('ERROR: artifacts/mcp_mcpjson.json does not contain a server object', file=sys.stderr)
    sys.exit(2)
print('OK: mcp_mcpjson.json looks valid; server keys:', list(j.keys())[:5])
PY
